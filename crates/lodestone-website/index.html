<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>Lodestone — A Modern Minecraft Launcher</title>
    <meta name="description" content="Lodestone is a free, open-source Minecraft launcher with instance management, mod discovery, co-op sync, and cross-platform support for Windows, macOS, and Linux." />
    <meta name="keywords" content="Minecraft launcher, Minecraft mod manager, open source Minecraft launcher, Lodestone, Minecraft instance manager, Minecraft mods, Minecraft modpacks, cross-platform Minecraft" />
    <meta name="author" content="Drew Chase" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://lodestonelauncher.com/" />
    <meta name="theme-color" content="#22ff84" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://lodestonelauncher.com/" />
    <meta property="og:site_name" content="Lodestone" />
    <meta property="og:title" content="Lodestone — A Modern Minecraft Launcher" />
    <meta property="og:description" content="Free, open-source Minecraft launcher with instance management, mod discovery, co-op sync, and cross-platform support." />
    <meta property="og:image" content="https://lodestonelauncher.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Lodestone Minecraft Launcher logo" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Lodestone — A Modern Minecraft Launcher" />
    <meta name="twitter:description" content="Free, open-source Minecraft launcher with instance management, mod discovery, co-op sync, and cross-platform support." />
    <meta name="twitter:image" content="https://lodestonelauncher.com/og-image.png" />
    <meta name="twitter:image:alt" content="Lodestone Minecraft Launcher logo" />

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/lodestone-logo.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Lodestone",
      "description": "A free, open-source Minecraft launcher with instance management, mod discovery, co-op sync, and cross-platform support.",
      "url": "https://lodestonelauncher.com",
      "applicationCategory": "GameApplication",
      "operatingSystem": "Windows, macOS, Linux",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "author": {
        "@type": "Person",
        "name": "Drew Chase"
      },
      "license": "https://opensource.org/licenses/GPL-3.0",
      "downloadUrl": "https://lodestonelauncher.com",
      "softwareHelp": "https://github.com/drew-chase/lodestone-minecraft-launcher"
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="src/main.tsx"></script>
  </body>
</html>
